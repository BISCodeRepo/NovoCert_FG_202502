services:
  p1:
    build:
      context: .
      dockerfile: Dockerfile
    image: novocert-p1:compose-build
    container_name: novocert-p1
    environment:
      - MEMORY=8
      - PRECURSOR_TOLERANCE=16
      - RANDOM_SEED=32
    volumes:
      - type: bind
        source: ../test_data/1/sample
        target: /app/input
      - type: bind
        source: ../test_data/1/output
        target: /app/output
